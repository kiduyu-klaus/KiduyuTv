name: Build Debug APK & Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.3) — leave blank to auto-generate'
        required: false
        default: ''
      release_notes:
        description: 'Release notes / changelog'
        required: false
        default: 'Debug build — see commits for changes.'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so we can count commits for auto-tag

      # ── 2. Java 17 (matches app/build.gradle compileOptions) ──────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle permission ───────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 4. Cache Gradle dependencies ──────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Build debug APK ─────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      # ── 6. Rename APK with version + commit sha ────────────────────────
      - name: Rename APK
        id: rename_apk
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ORIGINAL="app/build/outputs/apk/debug/app-debug.apk"
          RENAMED="app/build/outputs/apk/debug/KiduyuTv-debug-${SHORT_SHA}.apk"
          mv "$ORIGINAL" "$RENAMED"
          echo "apk_path=$RENAMED" >> $GITHUB_OUTPUT
          echo "apk_name=KiduyuTv-debug-${SHORT_SHA}.apk" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      # ── 7. Upload APK as workflow artifact (available on every run) ────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KiduyuTv-debug-${{ steps.rename_apk.outputs.short_sha }}
          path: ${{ steps.rename_apk.outputs.apk_path }}
          retention-days: 30

      # ── 8. Determine release tag ───────────────────────────────────────
      #   • Manual dispatch: use the provided tag, or auto-generate one
      #   • Push to main/master: auto-generate from versionName + commit count
      #   • Pull request: skip release entirely
      - name: Determine release tag
        id: tag
        if: github.event_name != 'pull_request'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            # Read versionName from build.gradle
            VERSION=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d '[:space:]')
            # Count commits as build number
            BUILD=$(git rev-list --count HEAD)
            TAG="v${VERSION}-build${BUILD}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      # ── 9. Create or update GitHub Release ────────────────────────────
      - name: Create or update GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "KiduyuTv ${{ steps.tag.outputs.tag }}"
          body: |
            ## KiduyuTv — Debug Build

            **Tag:** `${{ steps.tag.outputs.tag }}`
            **Commit:** [`${{ steps.rename_apk.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Branch:** `${{ github.ref_name }}`
            **Built:** ${{ github.run_id }}

            ---

            ${{ github.event.inputs.release_notes || 'Automated debug build from latest commit.' }}

            ---

            ### Install
            1. Download `KiduyuTv-debug-*.apk` below
            2. Enable **Install unknown apps** on your Android TV / Fire TV device
            3. Sideload via ADB:
               ```bash
               adb connect <device-ip>:5555
               adb install KiduyuTv-debug-*.apk
               ```
          files: ${{ steps.rename_apk.outputs.apk_path }}
          # If tag already exists → update the release (draft: false keeps it public)
          draft: false
          prerelease: true        # debug builds are pre-releases by convention
          make_latest: false      # don't override a signed release as "latest"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
